build:
  maxIssues: 50
  excludeCorrectable: false

processors:
  active: true
  exclude:
    - 'FunctionCountProcessor'
    - 'PropertyCountProcessor'
    - 'ClassCountProcessor'
    - 'PackageCountProcessor'
    - 'KtFileCountProcessor'

console-reports:
  active: true
  exclude:
    - 'ProjectStatisticsReport'
    - 'ComplexityReport'
    - 'NotificationReport'
    - 'FindingsReport'
    - 'FileBasedInfoReport'

output-reports:
  active: true
  exclude:
    - 'XmlOutputReport'
    - 'HtmlOutputReport'

comments:
  active: true
  UndocumentedPublicClass:
    active: false
  UndocumentedPublicFunction:
    active: false

complexity:
  active: true
  ComplexCondition:
    threshold: 4
  LongParameterList:
    threshold: 8
  TooManyFunctions:
    active: true
    thresholdInFiles: 15
    thresholdInClasses: 15

style:
  active: true
  MagicNumber:
    active: false
  MaxLineLength:
    active: true
    maxLineLength: 140

exceptions:
  active: true

naming:
  active: true

performance:
  active: true

potential-bugs:
  active: true
